name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: tusharsb011-ctrl
          outputs: |
            output/pacman-contribution-graph.svg

      - uses: EndBug/add-and-commit@v9
        with:
          add: "output/pacman-contribution-graph.svg"
          message: "Update Pacman graph"
